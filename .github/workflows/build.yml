name: Build APK with Buildozer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK (in Buildozer Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kivy/buildozer:latest \
            bash -c "
              sed -i 's/os.geteuid() == 0/False/' /home/user/.venv/lib/python3.14/site-packages/buildozer/__init__.py
              buildozer -v android debug
            "

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PK10-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
