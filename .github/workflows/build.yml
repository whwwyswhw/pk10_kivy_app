name: Build APK with Buildozer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev autoconf libtool pkg-config zip unzip openjdk-17-jdk python3-pip python3-dev python3-venv lld

      - name: Install Buildozer (pin pip 24.3.1)
        run: |
          python3 -m pip install --force-reinstall "pip==24.3.1" setuptools==69.5.1 wheel
          python3 -m pip install "buildozer==1.5.1" "cython==0.29.37"

      - name: Setup Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          cd ~/.buildozer/android/platform
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools android-sdk/cmdline-tools/latest
          mkdir -p android-sdk/tools/bin
          ln -sf ../../cmdline-tools/latest/bin/sdkmanager android-sdk/tools/bin/sdkmanager
          yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk --licenses
          android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk "platform-tools" "platforms;android-33" "build-tools;33.0.0"

      - name: Setup NDK r25b
        run: |
          cd ~/.buildozer/android/platform
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip

      - name: Set environment
        run: |
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "PIP_NO_PIP_VERSION_CHECK=1" >> $GITHUB_ENV
          echo "PIP_DISABLE_PIP_VERSION_CHECK=1" >> $GITHUB_ENV

      - name: Clone + patch p4a (fix pip upgrade bug)
        run: |
          mkdir -p .buildozer/android/platform
          cd .buildozer/android/platform
          rm -rf python-for-android
          git clone --depth=1 https://github.com/kivy/python-for-android.git
          cd python-for-android
          echo "Patching p4a build.py..."
          find pythonforandroid/ -name "*.py" -exec sed -i 's/pip install -U pip/pip install pip==24.3.1/g' {} +
          echo "After patch:"
          grep -rn "pip install" pythonforandroid/build.py | head -10 || true
          touch /tmp/p4a_patched

      - name: Add p4a.source_dir to buildozer.spec
        run: |
          echo "" >> buildozer.spec
          echo "# Use local patched p4a" >> buildozer.spec
          echo "p4a.source_dir = .buildozer/android/platform/python-for-android" >> buildozer.spec
          echo "p4a.branch = master" >> buildozer.spec
          tail -6 buildozer.spec

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            .buildozer
          key: buildozer-${{ runner.os }}-v8-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-v8-
            buildozer-${{ runner.os }}-v7-

      - name: Build APK
        env:
          PIP_NO_PIP_VERSION_CHECK: "1"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: buildozer -v android debug

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PK10-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
